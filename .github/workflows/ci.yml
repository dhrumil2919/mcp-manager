name: CI

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]

env:
  GO_VERSION: '1.21'

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Go
      uses: actions/setup-go@v4
      with:
        go-version: ${{ env.GO_VERSION }}

    - name: Cache Go modules
      uses: actions/cache@v3
      with:
        path: ~/go/pkg/mod
        key: ${{ runner.os }}-go-${{ hashFiles('**/go.sum') }}
        restore-keys: |
          ${{ runner.os }}-go-

    - name: Download dependencies
      run: go mod download

    - name: Verify dependencies
      run: go mod verify

    - name: Run tests
      run: go test -v -race -coverprofile=coverage.out ./...

  build:
    name: Build
    runs-on: ubuntu-latest
    needs: test
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Go
      uses: actions/setup-go@v4
      with:
        go-version: ${{ env.GO_VERSION }}

    - name: Cache Go modules
      uses: actions/cache@v3
      with:
        path: ~/go/pkg/mod
        key: ${{ runner.os }}-go-${{ hashFiles('**/go.sum') }}
        restore-keys: |
          ${{ runner.os }}-go-

    - name: Download dependencies
      run: go mod download

    - name: Build binary
      run: make build

    - name: Test binary
      run: |
        ./build/mcp-manager --help
        ./build/mcp-manager version

    - name: Upload build artifacts
      uses: actions/upload-artifact@v4
      with:
        name: mcp-manager-${{ github.sha }}
        path: build/mcp-manager
        retention-days: 7

  auto-tag:
    name: Auto Tag
    runs-on: ubuntu-latest
    needs: build
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    permissions:
      contents: write
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      with:
        fetch-depth: 0

    - name: Check existing tags
      run: |
        echo "Existing tags:"
        git tag -l | sort -V
        echo "Latest tag:"
        git describe --tags --abbrev=0 2>/dev/null || echo "No tags found"

    - name: Get latest tag
      id: latest_tag
      run: |
        # Get the latest tag with proper sorting
        LATEST_TAG=$(git tag -l | grep -E '^v?[0-9]+\.[0-9]+\.[0-9]+' | sort -V | tail -1)
        if [ -z "$LATEST_TAG" ]; then
          LATEST_TAG="v0.0.0"
        fi
        echo "latest_tag=$LATEST_TAG" >> $GITHUB_OUTPUT
        echo "Latest tag found: $LATEST_TAG"

    - name: Determine next version
      id: semver
      uses: ietf-tools/semver-action@v1
      with:
        token: ${{ github.token }}
        branch: main
        fromTag: ${{ steps.latest_tag.outputs.latest_tag }}
        skipInvalidTags: true
        noVersionBumpBehavior: 'silent'
        majorList: 'BREAKING CHANGE,BREAKING-CHANGE'
        minorList: 'feat,feature'
        patchList: 'fix,bugfix,perf,refactor,test,tests,chore,docs,doc'
        patchAll: false

    - name: Create and push tag
      if: steps.semver.outputs.next != ''
      run: |
        NEW_TAG="${{ steps.semver.outputs.next }}"

        # Check if tag already exists
        if git rev-parse "$NEW_TAG" >/dev/null 2>&1; then
          echo "⚠️ Tag $NEW_TAG already exists, skipping tag creation" >> $GITHUB_STEP_SUMMARY
          exit 0
        fi

        # Configure git
        git config user.name "github-actions[bot]"
        git config user.email "github-actions[bot]@users.noreply.github.com"

        # Create and push tag
        git tag -a "$NEW_TAG" -m "Release $NEW_TAG"
        git push origin "$NEW_TAG"

        echo "✅ Created and pushed tag: $NEW_TAG" >> $GITHUB_STEP_SUMMARY

    - name: No version bump
      if: steps.semver.outputs.next == ''
      run: |
        echo "ℹ️ No version bump needed - no conventional commits found" >> $GITHUB_STEP_SUMMARY