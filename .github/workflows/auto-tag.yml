name: Auto Tag

on:
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      version_type:
        description: 'Version bump type'
        required: true
        default: 'patch'
        type: choice
        options:
          - patch
          - minor
          - major

env:
  GO_VERSION: '1.21'

jobs:
  auto-tag:
    name: Auto Tag
    runs-on: ubuntu-latest
    permissions:
      contents: write
    outputs:
      new-tag: ${{ steps.semver.outputs.next }}
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      with:
        fetch-depth: 0

    - name: Set up Go
      uses: actions/setup-go@v4
      with:
        go-version: ${{ env.GO_VERSION }}

    - name: Run tests before tagging
      run: |
        go mod download
        go test -v ./...

    - name: Build and verify
      run: |
        make build
        ./build/mcp-manager --help

    - name: Determine next version
      id: semver
      uses: ietf-tools/semver-action@v1
      with:
        token: ${{ github.token }}
        branch: main
        skipInvalidTags: true
        noVersionBumpBehavior: 'silent'
        majorList: 'BREAKING CHANGE,BREAKING-CHANGE'
        minorList: 'feat,feature'
        patchList: 'fix,bugfix,perf,refactor,test,tests,chore,docs,doc'
        patchAll: false

    - name: Create and push tag
      if: steps.semver.outputs.next != ''
      run: |
        NEW_TAG="${{ steps.semver.outputs.next }}"
        
        # Configure git
        git config user.name "github-actions[bot]"
        git config user.email "github-actions[bot]@users.noreply.github.com"
        
        # Get previous tag for changelog
        PREV_TAG=$(git describe --tags --abbrev=0 2>/dev/null || echo "")
        
        # Create and push tag with simple message
        git tag -a "$NEW_TAG" -m "Release $NEW_TAG"
        git push origin "$NEW_TAG"
        
        echo "✅ Created and pushed tag: $NEW_TAG" >> $GITHUB_STEP_SUMMARY

    - name: No version bump
      if: steps.semver.outputs.next == ''
      run: |
        echo "ℹ️ No version bump needed - no conventional commits found" >> $GITHUB_STEP_SUMMARY
